name: YouTube Live Stream
on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 5,6,0'
jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Download Video
        run: |
          pip install yt-dlp
          yt-dlp -o video.mp4 "https://youtu.be/x0ZpxkDeXIg?si=Jhk7XEymY50LkN4e"
      - name: Start Stream
        working-directory: ${{ github.workspace }}
        run: |
          chmod +x stream.sh
          bash stream.sh

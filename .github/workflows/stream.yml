name: YouTube Live Stream
on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 5,6,0'
jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download Video
        run: wget -O video.mp4 "https://www.dropbox.com/scl/fi/23dgnitef3j2n4b6wcjqs/Record_2026-06-11-20-26-06.mp4?rlkey=vrwyftsj5wjfm9m136xpax4l8&st=w6njaed5&dl=1"

      - name: Start Stream
        working-directory: ${{ github.workspace }}
        run: |
          chmod +x stream.sh
          bash stream.sh
        env:
          STREAM_KEY: ${{ secrets.STREAM_KEY }}
